<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối - ABC DMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            color: white;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            opacity: 0.9;
        }
        .error-message {
            font-size: 28px;
            margin: 20px 0;
            font-weight: 600;
        }
        .error-description {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .btn-back {
            background-color: white;
            color: #667eea;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 8px;
        }
        .btn-back:hover {
            background-color: #f0f0f0;
            color: #764ba2;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-code">403</div>
    <div class="error-message">Truy cập bị từ chối</div>
    <div class="error-description">
        Bạn không có quyền truy cập tài nguyên này.<br>
        Vui lòng liên hệ quản trị viên hệ thống để được cấp quyền.
    </div>
    <div>
        <a href="/" class="btn btn-back">← Quay lại trang chủ</a>
    </div>
</div>
</body>
</html>
